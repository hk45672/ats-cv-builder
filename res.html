<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATS CV Builder - 90+ Score for Indian Freshers</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4.1.1/dist/tesseract.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .form-section {
            background: #f8f9ff;
            padding: 25px;
            border-radius: 15px;
            border: 2px solid #e1e8ff;
        }
        .preview-section {
            background: white;
            padding: 25px;
            border-radius: 15px;
            border: 2px solid #ddd;
            height: fit-content;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }
        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.2);
        }
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        .btn {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            margin: 10px 0;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        .cv-preview {
            background: white;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 30px;
            font-family: 'Times New Roman', serif;
            font-size: 12px;
            line-height: 1.4;
            max-height: 800px;
            overflow-y: auto;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .cv-preview h2 {
            color: #333;
            border-bottom: 2px solid #667eea;
            padding-bottom: 5px;
            margin-bottom: 15px;
        }
        .cv-preview h3 {
            color: #555;
            margin: 15px 0 8px 0;
            font-size: 14px;
        }
        .cv-preview ul {
            margin-left: 20px;
        }
        .cv-preview li {
            margin-bottom: 5px;
        }
        .score-badge {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #28a745;
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.3);
        }
        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            background: #f8f9ff;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .upload-area:hover {
            background: #e1e8ff;
            border-color: #764ba2;
        }
        .skills-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .skill-item {
            display: flex;
            align-items: center;
            padding: 8px;
            background: white;
            border-radius: 5px;
            border: 1px solid #eee;
        }
        .skill-checkbox {
            margin-right: 10px;
        }
        .hidden-file {
            display: none;
        }
        .btn-score {
            background: linear-gradient(45deg, #28a745, #20c997) !important;
        }
        .btn-download {
            background: linear-gradient(45deg, #ff6b6b, #ee5a24) !important;
            display: none;
        }
        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
                padding: 20px;
            }
            .header h1 {
                font-size: 2em;
            }
        }
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="score-badge" id="scoreBadge">ATS Score: 0/100</div>
    
    <div class="container">
        <div class="header">
            <h1>🚀 ATS CV Builder</h1>
            <p>Build 90+ Score ATS-Friendly CV for Indian Freshers & Undergrads</p>
        </div>

        <div class="main-content">
            <div class="form-section">
                <h2>📝 Build Your CV</h2>
                
                <!-- LinkedIn Upload -->
                <div class="form-group">
                    <label>📤 Upload LinkedIn PDF (Auto-fill)</label>
                    <div class="upload-area" onclick="document.getElementById('linkedinFile').click()">
                        <p>Click to upload LinkedIn PDF or drag & drop</p>
                        <input type="file" id="linkedinFile" accept=".pdf" class="hidden-file" onchange="parseLinkedInPDF()">
                    </div>
                </div>

                <div class="form-group">
                    <label>* Full Name</label>
                    <input type="text" id="fullName" placeholder="e.g., Rahul Sharma" required>
                </div>

                <div class="form-group">
                    <label>* Phone</label>
                    <input type="tel" id="phone" placeholder="e.g., +91 9876543210" required>
                </div>

                <div class="form-group">
                    <label>* Email</label>
                    <input type="email" id="email" placeholder="e.g., rahul@gmail.com" required>
                </div>

                <div class="form-group">
                    <label>* LinkedIn / Portfolio</label>
                    <input type="url" id="linkedin" placeholder="https://linkedin.com/in/yourprofile">
                </div>

                <div class="form-group">
                    <label>Location</label>
                    <input type="text" id="location" placeholder="e.g., Bangalore, Karnataka">
                </div>

                <div class="form-group">
                    <label>Objective (ATS Keywords)</label>
                    <textarea id="objective" placeholder="Seeking Software Developer role... passionate about coding..."></textarea>
                </div>

                <div class="form-group">
                    <label>Education</label>
                    <textarea id="education" placeholder="B.Tech Computer Science, XYZ University, 2020-2024
CGPA: 8.5/10
Key Subjects: Data Structures, Algorithms, DBMS"></textarea>
                </div>

                <div class="form-group">
                    <label>Skills (Select for ATS Optimization)</label>
                    <div class="skills-grid">
                        <div class="skill-item"><input type="checkbox" class="skill-checkbox" value="Python" title="Python"> Python</div>
                        <div class="skill-item"><input type="checkbox" class="skill-checkbox" value="JavaScript" title="JavaScript"> JavaScript</div>
                        <div class="skill-item"><input type="checkbox" class="skill-checkbox" value="Java" title="Java"> Java</div>
                        <div class="skill-item"><input type="checkbox" class="skill-checkbox" value="React" title="React"> React</div>
                        <div class="skill-item"><input type="checkbox" class="skill-checkbox" value="Node.js" title="Node.js"> Node.js</div>
                        <div class="skill-item"><input type="checkbox" class="skill-checkbox" value="SQL" title="SQL"> SQL</div>
                        <div class="skill-item"><input type="checkbox" class="skill-checkbox" value="Git" title="Git"> Git</div>
                        <div class="skill-item"><input type="checkbox" class="skill-checkbox" value="AWS" title="AWS"> AWS</div>
                        <div class="skill-item"><input type="checkbox" class="skill-checkbox" value="Machine Learning" title="Machine Learning"> ML</div>
                        <div class="skill-item"><input type="checkbox" class="skill-checkbox" value="Data Structures" title="Data Structures"> DSA</div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Projects</label>
                    <textarea id="projects" placeholder="E-Commerce Website | React, Node.js | 2024
- Built full-stack app with user authentication
- Integrated payment gateway (Razorpay)"></textarea>
                </div>

                <div class="form-group">
                    <label>Experience/Internships</label>
                    <textarea id="experience" placeholder="Software Intern, ABC Tech | Jun-Aug 2023
- Developed REST APIs using Express.js
- Improved database query performance by 40%"></textarea>
                </div>

                <div class="form-group">
                    <label>Certifications</label>
                    <textarea id="certifications" placeholder="AWS Certified Developer - Associate | 2024
Google Data Analytics Certificate | 2023"></textarea>
                </div>

                <button class="btn" onclick="generateCV()">🎯 Generate ATS CV</button>
                <button class="btn btn-score" onclick="calculateATSScore()">📊 Calculate ATS Score</button>
                <button class="btn btn-download" onclick="downloadCV()" id="downloadBtn">💾 Download PDF</button>
            </div>

            <div class="preview-section">
                <h3>👁️ Live CV Preview (ATS Optimized)</h3>
                <div class="cv-preview" id="cvPreview">
                    <h2 id="previewName">Your Name</h2>
                    <p id="previewContact"></p>
                    <div id="previewContent"></div>
                </div>
            </div>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Processing your CV...</p>
        </div>
    </div>

    <script>
        // ATS Optimization Keywords for Indian Freshers
        const ATS_KEYWORDS = {
            software: ['Python', 'JavaScript', 'Java', 'React', 'Node.js', 'SQL', 'Git', 'AWS', 'Docker', 'MongoDB'],
            data: ['Machine Learning', 'Data Structures', 'Algorithms', 'Pandas', 'NumPy', 'Tableau'],
            web: ['HTML', 'CSS', 'React', 'Angular', 'Vue', 'Bootstrap', 'Django', 'Flask'],
            mobile: ['Flutter', 'React Native', 'Android', 'iOS', 'Kotlin', 'Swift']
        };

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            updatePreview();
        });

        // Real-time preview update
        document.querySelectorAll('input, textarea, .skill-checkbox').forEach(element => {
            element.addEventListener('input', updatePreview);
            element.addEventListener('change', updatePreview);
        });

        function updatePreview() {
            const name = document.getElementById('fullName').value || 'Your Name';
            const phone = document.getElementById('phone').value;
            const email = document.getElementById('email').value;
            const linkedin = document.getElementById('linkedin').value;
            const location = document.getElementById('location').value;

            document.getElementById('previewName').textContent = name;
            
            let contact = '';
            if (phone) contact += phone + ' | ';
            if (email) contact += email + ' | ';
            if (linkedin) contact += linkedin + ' | ';
            if (location) contact += location;
            document.getElementById('previewContact').textContent = contact;

            // Update skills
            const skills = Array.from(document.querySelectorAll('.skill-checkbox:checked'))
                .map(cb => cb.value).join(' | ');
            
            // Build preview content
            let content = '';
            const sections = [
                { id: 'objective', title: 'CAREER OBJECTIVE' },
                { id: 'education', title: 'EDUCATION' },
                { id: 'skills', title: 'TECHNICAL SKILLS', content: skills },
                { id: 'projects', title: 'PROJECTS' },
                { id: 'experience', title: 'EXPERIENCE' },
                { id: 'certifications', title: 'CERTIFICATIONS' }
            ];

            sections.forEach(section => {
                const value = document.getElementById(section.id)?.value.trim();
                if (value || section.content) {
                    content += `<h3>${section.title}</h3>`;
                    content += section.content || value;
                    content += '<br><br>';
                }
            });

            document.getElementById('previewContent').innerHTML = content;
        }

        function calculateATSScore() {
            const text = document.getElementById('cvPreview').textContent.toLowerCase();
            let score = 0;
            let totalChecks = 0;

            // Check keyword density
            Object.values(ATS_KEYWORDS).forEach(category => {
                category.forEach(keyword => {
                    totalChecks++;
                    if (text.includes(keyword.toLowerCase())) {
                        score += 3;
                    }
                });
            });

            // Format & Structure (30 points)
            if (document.getElementById('fullName').value.trim()) score += 10;
            if (document.getElementById('phone').value.trim()) score += 5;
            if (document.getElementById('email').value.trim()) score += 5;
            if (document.querySelector('.skill-checkbox:checked')) score += 10;

            // Length optimization (15 points)
            const wordCount = text.split(' ').length;
            if (wordCount > 200 && wordCount < 800) score += 15;

            score = Math.min(score, 100);
            document.getElementById('scoreBadge').textContent = `ATS Score: ${score}/100`;
            document.getElementById('scoreBadge').style.background = 
                score >= 90 ? '#28a745' : score >= 75 ? '#ffc107' : '#dc3545';
        }

        async function parseLinkedInPDF() {
            const fileInput = document.getElementById('linkedinFile');
            const file = fileInput.files[0];
            if (!file) return;

            document.getElementById('loading').style.display = 'block';

            try {
                // Using Tesseract.js for PDF text extraction
                const result = await Tesseract.recognize(file, 'eng', {
                    logger: m => console.log(m)
                });

                const extractedText = result.data.text;
                console.log('Extracted text:', extractedText);

                // Parse common LinkedIn PDF patterns
                const lines = extractedText.split('\n').map(l => l.trim()).filter(l => l);
                
                // Auto-fill fields
                for (let line of lines) {
                    if (line.match(/[\+91|\+1]?[6-9]\d{9}/)) {
                        document.getElementById('phone').value = line;
                    }
                    if (line.includes('@') && line.includes('.')) {
                        document.getElementById('email').value = line;
                    }
                    if (line.includes('linkedin.com') || line.includes('github.com')) {
                        document.getElementById('linkedin').value = line;
                    }
                    if (line.match(/B\.Tech|B.E\.|BSc|BA|Engineering|Computer Science/i)) {
                        document.getElementById('education').value += line + '\n';
                    }
                }

                updatePreview();
                calculateATSScore();
            } catch (error) {
                alert('Could not parse PDF. Please enter details manually.');
                console.error('PDF parsing error:', error);
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        function generateCV() {
            calculateATSScore();
            document.getElementById('downloadBtn').classList.remove('btn-download');
        }

        async function downloadCV() {
            const { jsPDF } = window.jspdf;
            
            const cvPreview = document.getElementById('cvPreview');
            const filename = document.getElementById('fullName').value.replace(/\s+/g, '_') + '_ATS_CV.pdf';
            
            try {
                const pdf = new jsPDF('p', 'mm', 'a4');
                const canvas = await html2canvas(cvPreview, { scale: 2, background: '#ffffff' });
                const imgData = canvas.toDataURL('image/png');
                const imgWidth = 210;
                const pageHeight = 295;
                const imgHeight = (canvas.height * imgWidth) / canvas.width;
                let heightLeft = imgHeight;
                let position = 0;

                pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight);
                heightLeft -= pageHeight;

                while (heightLeft > 0) {
                    position = heightLeft - imgHeight;
                    pdf.addPage();
                    pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight);
                    heightLeft -= pageHeight;
                }

                pdf.save(filename);
            } catch (error) {
                console.error('Error generating PDF:', error);
                alert('Error generating PDF. Please try again.');
            }
        }
    </script>
</body>
</html>
